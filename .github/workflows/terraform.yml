name: terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.15.1"
  TF_IN_AUTOMATION: "true"

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt -check -recursive
        run: terraform fmt -check -recursive

  validate:
    name: terraform validate (examples/basic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init -backend=false
        working-directory: examples/basic
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: examples/basic
        run: terraform validate -no-color

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: tflint --version
        run: tflint --version

      - name: tflint --init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: tflint --recursive
        # TFLINT_CONFIG_FILE so the root .tflint.hcl is also applied to
        # subdirectories visited by --recursive (otherwise each dir needs
        # its own .tflint.hcl).
        run: tflint --recursive --format compact
        env:
          TFLINT_CONFIG_FILE: ${{ github.workspace }}/.tflint.hcl

  trivy:
    name: trivy config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-config
